version: '3.9'

services:
  bot:
    build: '.'
    depends_on:
      - 'database'
    volumes:
      - '.:/usr/src/app'
      - './config.json:/usr/src/app/config.json'
      - './.env:/usr/src/app/.env'

  database:
    image: 'mongo'
    volumes:
      - './data-db:/data/db'
    ports:
      - '9227:27017'